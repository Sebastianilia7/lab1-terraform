name: Terraform GCP Workflow

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.5"
          terraform_wrapper: false

      - name: Setup GCP credentials
        run: echo '${{ secrets.GCP_SA_KEY }}' > gcp-sa-key.json

      - name: Validate GCP JSON
        run: cat gcp-sa-key.json | jq .

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./gcp-sa-key.json
          TF_VAR_project_id: "chas-devsecops-2026"
          TF_VAR_region: "europe-west1"
          TF_VAR_student_id: "sebbe"
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./gcp-sa-key.json
          TF_VAR_project_id: "chas-devsecops-2026"
          TF_VAR_region: "europe-west1"
          TF_VAR_student_id: "sebbe"
        run: terraform apply -auto-approve
