name: Terraform Plan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.14.7"

      - name: Setup GCP credentials
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > gcp-sa-key.json

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan
