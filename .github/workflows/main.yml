name: Terraform GCP CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.5"
          terraform_wrapper: false

      - name: Setup GCP credentials
        run: |
          # Skriv ut hela secret exakt som JSON till en fil
          echo '${{ secrets.GCP_SA_KEY }}' > gcp-sa-key.json
        # OBS: här använder vi enkla citattecken runt secret enligt lärarens instruktion

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./gcp-sa-key.json
        run: terraform plan
